<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Verjaardag - Demi 21</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; }
        .login-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 20, 0, 0.9);
            padding: 40px; border: 2px solid #00ff00;
            box-shadow: 0 0 20px #00ff00; text-align: center; color: #00ff00;
        }
        input { 
            padding: 12px; width: 250px; background: #000; 
            border: 1px solid #00ff00; color: #00ff00; margin-bottom: 20px; 
            text-align: center; font-size: 1.1em; outline: none;
        }
        
        /* De tijl voor de hoofdknop (ontgrendelen) */
        .main-btn { 
            padding: 10px 25px; background: #00ff00; color: #000; 
            border: none; cursor: pointer; font-weight: bold; font-size: 1em;
        }
        .main-btn:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        
        /* De stijl voor de nieuwe hint-knop */
        .hint-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 15px;
            margin-top: 20px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }
        .hint-btn:hover {
            background: #005500;
        }

        /* De stijl voor de hint-tekst zelf (valt nu veel meer op!) */
        .hint-text { 
            color: #ffff00; /* Geel in plaats van donkergroen */
            font-size: 1em; 
            margin-top: 15px; 
            text-shadow: 0 0 5px #ffff00; /* Een lichte gloed */
            display: none; /* Standaard onzichtbaar! */
        }
    </style>
</head>
<body> 
    <canvas id="matrix"></canvas>
    
    <div class="login-box">
        <h1>SYSTEEM VERGRENDELD</h1>
        <p>Toegang krijg je niet zomaar stinkdier ❤️<strong>DEMI</strong></p>
        
        <input type="password" id="passwordInput" placeholder="VOER TOEGANGSCODE IN" onkeydown="if(event.key === 'Enter') checkPassword()">
        <br>
        <button class="main-btn" onclick="checkPassword()">ONTGRENDELEN</button>
        <br>
        
        <button class="hint-btn" onclick="toggleHint()">HULP NODIG?</button>
        
        <p id="hintText" class="hint-text">Hint: zoek ergens waar wij beiden erg van kunnen smullen 🍪</p>
    </div>

    <script>
        function toggleHint() {
            var hint = document.getElementById("hintText");
            // Als de hint onzichtbaar is, maak hem dan zichtbaar. Anders verberg je hem weer.
            if (hint.style.display === "none" || hint.style.display === "") {
                hint.style.display = "block";
            } else {
                hint.style.display = "none";
            }
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
