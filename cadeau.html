<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Gefeliciteerd Demi! 🎈</title>
    <script>
        // BEVEILIGING: Controleer of de hack is uitgevoerd
        function checkToegang() {
            const cookies = document.cookie.split('; ');
            const cookieData = cookies.find(row => row.startsWith('Sessie_Sleutel='));
            const waarde = cookieData ? cookieData.split('=')[1] : null;

            if (waarde !== "Demi21Party") {
                alert("HACK MISLUKT: Je hebt de code nog niet gekraakt!");
                window.location.href = "index.html";
            }
        }
        checkToegang();
    </script>
    <style>
        /* Vrolijke roze achtergrond */
        body { 
            background: linear-gradient(135deg, #ffd1ff 0%, #fae1dd 100%);
            color: #333; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
        }
        
        /* Het witte 'kaartje' in het midden */
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
        }

        h1 { color: #ff4d85; font-size: 3em; margin-bottom: 5px; text-transform: uppercase; }
        .hacker-msg { font-family: 'Courier New', monospace; color: #888; font-size: 0.9em; margin-bottom: 30px; }
        .intro-text { font-size: 1.3em; color: #555; }

        /* Polaroid Galerij Styling */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .polaroid {
            background: white;
            padding: 10px 10px 20px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 5px;
            /* Beetje schuin zetten voor een speels effect 
            transform: rotate(-3deg); 
            transition: transform 0.3s ease;
        }
        
        /* Draai sommige foto's de andere kant op */
        .polaroid:nth-child(even) { transform: rotate(4deg); }
        
        /* Als ze er met de muis overheen gaat, wordt de foto recht en iets groter */
        .polaroid:hover { transform: scale(1.05) rotate(0deg); z-index: 10; position: relative; }

        .polaroid img {
            width: 200px;
            height: 250px;
            object-fit: cover; /* Zorgt dat de foto's mooi bijgesneden worden */
            border-radius: 3px;
        }

        /* Het uiteindelijke cadeau gedeelte */
        .cadeau-sectie {
            border-top: 3px dashed #ffb3c6;
            padding-top: 40px;
            margin-top: 20px;
        }

        h2 { color: #ff4d85; font-size: 2.5em; margin-bottom: 10px; }
        
        .niels-foto {
            width: 100%;
            max-width: 450px;
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 10px;
            transform: rotate(2deg);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gefeliciteerd Demi! 🥂</h1>
        <p class="hacker-msg">> SYSTEEM SUCCESVOL GEHACKT. TOEGANG VERLEEND.</p>
        
        <p class="intro-text">Lieve Demi, je bent eindelijk 21 jaar geworden! Tijd om dit goed te vieren.</p>
        
        <div class="gallery">
            <div class="polaroid"><img src="Foto1.png" alt="Wij samen"></div>
            <div class="polaroid"><img src="Foto2.png" alt="Wij samen lachend"></div>
            <div class="polaroid"><img src="Foto3.png" alt="Wij samen lachend 2"></div>
            <div class="polaroid"><img src="Foto4.png" alt="Demi met ijs"></div>
        </div>

        <div class="cadeau-sectie">
            <h2>Jouw Cadeau 🎁</h2>
            <p class="intro-text"><strong>We gaan samen heerlijk uit eten!</strong></p>
            <p style="color: #777;">En zoals je kunt zien... ik heb geen keus, excuses worden niet geaccepteerd! 😉</p>
            
            <img src="uitetenniels.png" alt="Niels moet mee uit eten" class="niels-foto">
        </div>
    </div>

</body>
</html>
